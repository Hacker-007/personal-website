name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build
        run: cargo build --release
        working-directory: backend

      - uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/target/release/backend
          if-no-files-found: error

  build-redis:
    name: Build Redis Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Redis repository
        uses: actions/checkout@v4
        with:
          repository: Hacker-007/codecrafters-redis
          ref: rewrite

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: mv target/release/redis target/release/redis-server

      - uses: actions/upload-artifact@v4
        with:
          name: redis-server
          path: target/release/redis-server
          if-no-files-found: error

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-redis]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy binaries
        run: |
          chmod +x binaries/backend binaries/redis-server
          rsync -az -e "ssh -o StrictHostKeyChecking=no" \
            binaries/backend ci@personal-website-vps:/home/ci/bin/backend
          rsync -az -e "ssh -o StrictHostKeyChecking=no" \
            binaries/redis-server ci@personal-website-vps:/home/ci/bin/redis-server

      - name: Restart services
        run: |
          ssh -o StrictHostKeyChecking=no ci@personal-website-vps \
            'sudo systemctl restart redis-server && sudo systemctl restart backend'
